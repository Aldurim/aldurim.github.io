<!Doctype html>
<html>
<head>
<title>Blender Game-Project Novic</title>
</head>

<body>
<script>
function reflect(inputID, outputID){
	var reflected = document.getElementById(inputID).value;
	document.getElementById(outputID).innerHTML = reflected;
}

function frameselect(optionID, outputID){
	var fselect = document.getElementById(optionID).value;
	if (fselect == "early morning"){
		document.getElementById(outputID).innerHTML = '<iframe src="https://www.youtube.com/watch?v=x0uwP_rvEPo"></iframe>';
	}
}
</script>

<input id="inputID_001"></input>
<button type="button" onclick="reflect('inputID_001','outputID_001');">submit</button>
<p id="outputID_001"></p>
<select>
	<option id="optionID_001" value="early morning" onclick="frameselect(optionID, outputID);">early morning</option> 
</select>
</body>

</html>
