<body>
<script>
function reflect(inputID, outputID){
	var reflected = document.getElementById(inputID).value;
	document.getElementById(outputID).innerHTML = reflected;
};
</script>

<input id="inputID_001"></input>
<button type="button" onclick="reflect('inputID_001','outputID_001');">submit</button>

<select>
	<option id="optionID_001" value="early morning">early morning</option> 
</select>
<p id="outputID_001"></p>
<iframe src="https://www.google.de/?hl=de"></iframe>
</body>
